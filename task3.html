<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tic Tac Toe</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#4e73df,#1cc88a);
}

.container{
    text-align:center;
}

h1{
    margin-bottom:15px;
    color:#fff;
}

.status{
    margin-bottom:20px;
    font-size:18px;
    color:#fff;
}

.board{
    display:grid;
    grid-template-columns:repeat(3,100px);
    grid-template-rows:repeat(3,100px);
    gap:5px;
    justify-content:center;
}

.cell{
    background:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:32px;
    font-weight:bold;
    cursor:pointer;
    border-radius:8px;
    transition:0.2s;
}

.cell:hover{
    background:#f1f1f1;
}

button{
    margin-top:20px;
    padding:10px 20px;
    border:none;
    border-radius:5px;
    cursor:pointer;
    background:#ff4757;
    color:#fff;
    font-size:14px;
}

button:hover{
    opacity:0.8;
}

@media(max-width:500px){
    .board{
        grid-template-columns:repeat(3,80px);
        grid-template-rows:repeat(3,80px);
    }
}
</style>
</head>

<body>

<div class="container">
    <h1>Tic Tac Toe</h1>
    <div class="status" id="status">Player X's Turn</div>

    <div class="board" id="board">
        <div class="cell" onclick="makeMove(this,0)"></div>
        <div class="cell" onclick="makeMove(this,1)"></div>
        <div class="cell" onclick="makeMove(this,2)"></div>
        <div class="cell" onclick="makeMove(this,3)"></div>
        <div class="cell" onclick="makeMove(this,4)"></div>
        <div class="cell" onclick="makeMove(this,5)"></div>
        <div class="cell" onclick="makeMove(this,6)"></div>
        <div class="cell" onclick="makeMove(this,7)"></div>
        <div class="cell" onclick="makeMove(this,8)"></div>
    </div>

    <button onclick="resetGame()">Restart Game</button>
</div>

<script>
let currentPlayer = "X";
let gameState = ["","","","","","","","",""];
let gameActive = true;

const winningConditions = [
    [0,1,2],
    [3,4,5],
    [6,7,8],
    [0,3,6],
    [1,4,7],
    [2,5,8],
    [0,4,8],
    [2,4,6]
];

function makeMove(cell, index){
    if(gameState[index] !== "" || !gameActive){
        return;
    }

    gameState[index] = currentPlayer;
    cell.innerText = currentPlayer;

    checkWinner();

    currentPlayer = currentPlayer === "X" ? "O" : "X";
    if(gameActive){
        document.getElementById("status").innerText = "Player " + currentPlayer + "'s Turn";
    }
}

function checkWinner(){
    let roundWon = false;

    for(let i=0; i<winningConditions.length; i++){
        let [a,b,c] = winningConditions[i];
        if(gameState[a] && gameState[a] === gameState[b] && gameState[a] === gameState[c]){
            roundWon = true;
            break;
        }
    }

    if(roundWon){
        document.getElementById("status").innerText = "Player " + currentPlayer + " Wins!";
        gameActive = false;
        return;
    }

    if(!gameState.includes("")){
        document.getElementById("status").innerText = "It's a Draw!";
        gameActive = false;
    }
}

function resetGame(){
    currentPlayer = "X";
    gameState = ["","","","","","","","",""];
    gameActive = true;
    document.getElementById("status").innerText = "Player X's Turn";

    document.querySelectorAll(".cell").forEach(cell => cell.innerText = "");
}
</script>

</body>
</html>
